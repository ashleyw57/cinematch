<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMatch</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:rgba(255,255,255,0.08);--accent:#e8b86d;--text:#f0ece4;--muted:#8b8880;--danger:#e05555}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;font-size:15px}
.hero{text-align:center;padding:72px 24px 48px;position:relative}
.logo{font-family:'Playfair Display',serif;font-size:52px;font-weight:700;background:linear-gradient(135deg,#e8b86d,#f0d5a0,#c9774a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
.tagline{color:var(--muted);font-size:16px;font-weight:300;margin-bottom:40px}
.search-wrap{max-width:600px;margin:0 auto 16px;position:relative}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:16px 56px 16px 24px;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--text);outline:none;transition:border-color 0.2s}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap input:focus{border-color:var(--accent)}
.search-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--accent);border:none;border-radius:50%;width:38px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.search-btn svg{width:16px;height:16px}
.moods{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:700px;margin:0 auto}
.mood-pill{background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:8px 18px;font-size:13px;color:var(--muted);cursor:pointer;transition:all 0.18s}
.mood-pill:hover,.mood-pill.active{border-color:var(--accent);color:var(--accent);background:rgba(232,184,109,0.08)}
.tabs{display:flex;border-bottom:1px solid var(--border);max-width:900px;margin:48px auto 0;padding:0 24px}
.tab{padding:12px 20px;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.18s;text-transform:uppercase;letter-spacing:0.3px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.main{max-width:900px;margin:0 auto;padding:32px 24px 80px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.section-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:400}
.section-count{font-size:12px;color:var(--muted)}
.genre-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
.genre-chip{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;color:var(--muted);cursor:pointer;transition:all 0.15s}
.genre-chip:hover,.genre-chip.active{border-color:var(--accent);color:var(--accent)}
.movie-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform 0.18s,border-color 0.18s;animation:fadeIn 0.3s ease both}
.movie-card:hover{transform:translateY(-4px);border-color:rgba(232,184,109,0.3)}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.movie-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
.movie-poster-placeholder{width:100%;aspect-ratio:2/3;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:32px}
.movie-info{padding:12px}
.movie-title{font-size:13px;font-weight:500;line-height:1.3;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.movie-meta{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted)}
.movie-rating{color:var(--accent);font-weight:500}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:680px;width:100%;max-height:85vh;overflow-y:auto;position:relative;animation:modalIn 0.25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
.modal-close{position:absolute;top:16px;right:16px;background:var(--surface2);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:18px;z-index:10}
.modal-hero{display:flex;gap:24px;padding:24px;border-bottom:1px solid var(--border)}
.modal-poster{width:120px;height:180px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--surface2)}
.modal-poster-placeholder{width:120px;height:180px;border-radius:8px;background:var(--surface2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:40px}
.modal-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:6px;line-height:1.2}
.modal-tagline{color:var(--muted);font-style:italic;font-size:14px;margin-bottom:12px}
.modal-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.badge{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;color:var(--muted)}
.badge.gold{border-color:rgba(232,184,109,0.4);color:var(--accent)}
.modal-body{padding:20px 24px}
.modal-overview{font-size:14px;line-height:1.7;color:#ccc8c0;margin-bottom:20px}
.modal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-box{background:var(--surface2);border-radius:8px;padding:12px;text-align:center}
.stat-value{font-size:20px;font-weight:500}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.modal-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:10px 20px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;border:1px solid var(--border)}
.btn-primary{background:var(--accent);color:#0a0a0f;border-color:var(--accent)}
.btn-ghost{background:transparent;color:var(--text)}
.btn-ghost:hover{background:var(--surface2)}
.watchlist-empty{text-align:center;padding:60px 24px;color:var(--muted)}
.watchlist-empty .icon{font-size:40px;margin-bottom:12px}
.wl-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:10px}
.wl-item.watched{opacity:0.5}
.wl-title{font-size:14px;font-weight:500;flex:1}
.wl-date{font-size:11px;color:var(--muted)}
.wl-actions{display:flex;gap:8px}
.wl-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif}
.wl-btn.done{color:#5cb85c;border-color:rgba(92,184,92,0.3)}
.decade-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-bottom:28px}
.decade-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--muted);transition:all 0.15s}
.decade-btn:hover,.decade-btn.active{border-color:var(--accent);color:var(--accent)}
.spinner{text-align:center;padding:60px;color:var(--muted);font-size:13px}
.spinner::before{content:'';display:block;width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{text-align:center;padding:40px;color:var(--danger);font-size:13px}
.wl-name-bar{display:flex;gap:8px;margin-bottom:20px}
.wl-name-bar input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none}
.wl-name-bar input:focus{border-color:var(--accent)}
</style>
</head>
<body>
<div class="hero">
  <div class="logo">CineMatch</div>
  <div class="tagline">discover your next favourite film</div>
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="Search by title, keyword…" autocomplete="off">
    <button class="search-btn" onclick="doSearch()">
      <svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="#0a0a0f" stroke-width="2.5" stroke-linecap="round" fill="none"/></svg>
    </button>
  </div>
  <div class="moods">
    <span class="mood-pill" onclick="doMood('happy')">😊 Happy</span>
    <span class="mood-pill" onclick="doMood('sad')">😢 Sad</span>
    <span class="mood-pill" onclick="doMood('excited')">⚡ Excited</span>
    <span class="mood-pill" onclick="doMood('scared')">👻 Scared</span>
    <span class="mood-pill" onclick="doMood('romantic')">💛 Romantic</span>
    <span class="mood-pill" onclick="doMood('thoughtful')">🤔 Thoughtful</span>
    <span class="mood-pill" onclick="doMood('adventurous')">🧭 Adventurous</span>
    <span class="mood-pill" onclick="doMood('chill')">🛋️ Chill</span>
  </div>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('discover')">Discover</div>
  <div class="tab" onclick="switchTab('genres')">Genres</div>
  <div class="tab" onclick="switchTab('decades')">Decades</div>
  <div class="tab" onclick="switchTab('gems')">Hidden Gems</div>
  <div class="tab" onclick="switchTab('watchlist')">My Watchlist</div>
</div>
<div class="main">
  <div id="tab-discover">
    <div class="section-header">
      <div class="section-title" id="discover-title">Trending This Week</div>
      <div class="section-count" id="discover-count"></div>
    </div>
    <div id="discover-results"></div>
  </div>
  <div id="tab-genres" style="display:none">
    <div class="genre-bar" id="genre-bar"></div>
    <div class="section-header"><div class="section-title" id="genre-title">Pick a genre</div></div>
    <div id="genre-results"></div>
  </div>
  <div id="tab-decades" style="display:none">
    <div class="decade-grid" id="decade-grid"></div>
    <div class="section-header"><div class="section-title" id="decade-title">Pick a decade</div></div>
    <div id="decade-results"></div>
  </div>
  <div id="tab-gems" style="display:none">
    <div class="section-header">
      <div class="section-title">Hidden Gems</div>
      <div class="section-count">High-rated · low-popularity</div>
    </div>
    <div id="gems-results"></div>
  </div>
  <div id="tab-watchlist" style="display:none">
    <div class="wl-name-bar">
      <input type="text" id="wl-name-input" placeholder="Watchlist name" value="default">
      <button class="btn btn-ghost" onclick="loadWatchlist()">Load</button>
      <button class="btn btn-primary" onclick="createWatchlist()">New</button>
    </div>
    <div class="section-header"><div class="section-title" id="wl-title">My Watchlist</div></div>
    <div id="wl-results"></div>
  </div>
</div>
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeOverlay()">×</button>
    <div class="modal-hero">
      <div id="modal-poster-wrap"></div>
      <div style="flex:1;min-width:0">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-tagline" id="modal-tagline"></div>
        <div class="modal-badges" id="modal-badges"></div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-stats" id="modal-stats"></div>
      <div class="modal-overview" id="modal-overview"></div>
      <div class="modal-actions" id="modal-actions"></div>
    </div>
  </div>
</div>
<script>
const API='';
let currentMovieId=null,currentMovieTitle=null,currentWatchlist='default',currentTab='discover';
const GENRES={28:'Action',12:'Adventure',16:'Animation',35:'Comedy',80:'Crime',99:'Documentary',18:'Drama',10751:'Family',14:'Fantasy',36:'History',27:'Horror',10402:'Music',9648:'Mystery',10749:'Romance',878:'Sci-Fi',53:'Thriller',10752:'War',37:'Western'};
async function api(path){const r=await fetch(API+path);if(!r.ok)throw new Error(await r.text());return r.json()}
function renderGrid(movies,containerId){
  const el=document.getElementById(containerId);
  if(!movies.length){el.innerHTML='<div class="error-msg">No results found.</div>';return}
  el.innerHTML=movies.map((m,i)=>`<div class="movie-card" style="animation-delay:${i*30}ms" onclick="openMovie(${m.id},'${escape(m.title)}')">${m.poster_path?`<img class="movie-poster" src="https://image.tmdb.org/t/p/w300${m.poster_path}" loading="lazy">`:'<div class="movie-poster-placeholder">🎬</div>'}<div class="movie-info"><div class="movie-title">${m.title}</div><div class="movie-meta"><span>${m.release_date?m.release_date.slice(0,4):'—'}</span><span class="movie-rating">★ ${m.vote_average?m.vote_average.toFixed(1):'—'}</span></div></div></div>`).join('');
  el.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:20px'}
function loading(id){document.getElementById(id).innerHTML='<div class="spinner">Loading…</div>'}
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['discover','genres','decades','gems','watchlist'][i]===tab));
  ['discover','genres','decades','gems','watchlist'].forEach(t=>document.getElementById('tab-'+t).style.display=t===tab?'block':'none');
  if(tab==='gems'&&!document.getElementById('gems-results').innerHTML)loadGems();
  if(tab==='genres'&&!document.getElementById('genre-bar').innerHTML)initGenres();
  if(tab==='decades'&&!document.getElementById('decade-grid').innerHTML)initDecades();
  if(tab==='watchlist')loadWatchlist()}
async function loadTrending(){loading('discover-results');document.getElementById('discover-title').textContent='Trending This Week';document.querySelectorAll('.mood-pill').forEach(p=>p.classList.remove('active'));const data=await api('/movies/trending?time_window=week');document.getElementById('discover-count').textContent=data.length+' films';renderGrid(data,'discover-results')}
async function doSearch(){const q=document.getElementById('search-input').value.trim();if(!q)return;switchTab('discover');loading('discover-results');document.getElementById('discover-title').textContent=`Results for "${q}"`;const data=await api(`/movies/search?q=${encodeURIComponent(q)}`);document.getElementById('discover-count').textContent=data.length+' results';renderGrid(data,'discover-results')}
async function doMood(mood){switchTab('discover');loading('discover-results');document.querySelectorAll('.mood-pill').forEach(p=>p.classList.toggle('active',p.textContent.toLowerCase().includes(mood)));const labels={happy:'Happy Picks',sad:'Tearjerkers',excited:'Adrenaline Rush',scared:'Horror Night',romantic:'Date Night',thoughtful:'Food for Thought',adventurous:'Epic Adventures',chill:'Easy Watching'};document.getElementById('discover-title').textContent=labels[mood]||mood;document.getElementById('search-input').value='';const data=await api(`/movies/discover/mood?mood=${mood}`);document.getElementById('discover-count').textContent=data.length+' films';renderGrid(data,'discover-results')}
function initGenres(){document.getElementById('genre-bar').innerHTML=Object.entries(GENRES).map(([id,name])=>`<span class="genre-chip" onclick="doGenre('${name}',this)">${name}</span>`).join('')}
async function doGenre(name,el){document.querySelectorAll('.genre-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');document.getElementById('genre-title').textContent=name;loading('genre-results');const data=await api(`/movies/discover/genre?genre=${encodeURIComponent(name)}`);renderGrid(data,'genre-results')}
function initDecades(){document.getElementById('decade-grid').innerHTML=[1950,1960,1970,1980,1990,2000,2010,2020].map(d=>`<button class="decade-btn" onclick="doDecade(${d},this)">${d}s</button>`).join('')}
async function doDecade(decade,el){document.querySelectorAll('.decade-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');document.getElementById('decade-title').textContent=`Best of the ${decade}s`;loading('decade-results');const data=await api(`/movies/discover/decade?decade=${decade}`);renderGrid(data,'decade-results')}
async function loadGems(){loading('gems-results');const data=await api('/movies/hidden-gems');renderGrid(data,'gems-results')}
async function openMovie(id,title){
  currentMovieId=id;currentMovieTitle=unescape(title);
  document.getElementById('overlay').classList.add('open');
  document.getElementById('modal-title').textContent='…';
  document.getElementById('modal-tagline').textContent='';
  document.getElementById('modal-badges').innerHTML='';
  document.getElementById('modal-stats').innerHTML='';
  document.getElementById('modal-overview').textContent='Loading…';
  document.getElementById('modal-actions').innerHTML='';
  document.getElementById('modal-poster-wrap').innerHTML='<div class="modal-poster-placeholder">🎬</div>';
  try{
    const m=await api(`/movies/${id}`);
    if(m.poster_path)document.getElementById('modal-poster-wrap').innerHTML=`<img class="modal-poster" src="https://image.tmdb.org/t/p/w300${m.poster_path}">`;
    document.getElementById('modal-title').textContent=m.title;
    document.getElementById('modal-tagline').textContent=m.tagline||'';
    document.getElementById('modal-badges').innerHTML=(m.genres||[]).map(g=>`<span class="badge">${g.name}</span>`).join('')+(m.runtime?`<span class="badge gold">${m.runtime} min</span>`:'')+( m.release_date?`<span class="badge">${m.release_date.slice(0,4)}</span>`:'');
    document.getElementById('modal-stats').innerHTML=`<div class="stat-box"><div class="stat-value" style="color:var(--accent)">★ ${m.vote_average.toFixed(1)}</div><div class="stat-label">Rating</div></div><div class="stat-box"><div class="stat-value">${(m.vote_count/1000).toFixed(0)}k</div><div class="stat-label">Votes</div></div><div class="stat-box"><div class="stat-value">${m.runtime||'—'}</div><div class="stat-label">Minutes</div></div>`;
    document.getElementById('modal-overview').textContent=m.overview||'No overview available.';
    document.getElementById('modal-actions').innerHTML=`<button class="btn btn-primary" onclick="addToWatchlist()">+ Add to Watchlist</button><button class="btn btn-ghost" onclick="loadRecs(${m.id})">Similar Films →</button>`
  }catch(e){document.getElementById('modal-overview').textContent='Could not load details.'}}
function closeModal(e){if(e.target===document.getElementById('overlay'))closeOverlay()}
function closeOverlay(){document.getElementById('overlay').classList.remove('open')}
async function loadRecs(id){closeOverlay();switchTab('discover');loading('discover-results');document.getElementById('discover-title').textContent='Similar Films';const data=await api(`/movies/${id}/recommendations`);document.getElementById('discover-count').textContent=data.length+' films';renderGrid(data,'discover-results')}
async function loadWatchlist(){const name=document.getElementById('wl-name-input').value.trim()||'default';currentWatchlist=name;document.getElementById('wl-title').textContent=name;const el=document.getElementById('wl-results');el.innerHTML='<div class="spinner">Loading…</div>';try{const wl=await api(`/watchlists/${name}`);renderWatchlist(wl)}catch(e){el.innerHTML=`<div class="watchlist-empty"><div class="icon">🎬</div><div>No watchlist named "${name}".<br>Create it first!</div></div>`}}
async function createWatchlist(){const name=document.getElementById('wl-name-input').value.trim()||'default';try{await fetch(`${API}/watchlists/?name=${encodeURIComponent(name)}`,{method:'POST'});loadWatchlist()}catch(e){}}
function renderWatchlist(wl){const el=document.getElementById('wl-results');if(!wl.items.length){el.innerHTML='<div class="watchlist-empty"><div class="icon">🍿</div><div>Your watchlist is empty.<br>Browse films and add them!</div></div>';return}el.innerHTML=wl.items.map(item=>`<div class="wl-item ${item.watched?'watched':''}" id="wl-${item.movie_id}"><div style="font-size:20px">${item.watched?'✅':'🎬'}</div><div style="flex:1"><div class="wl-title">${item.title}</div><div class="wl-date">${item.notes||''} · Added ${item.added_at.slice(0,10)}</div></div><div class="wl-actions">${!item.watched?`<button class="wl-btn done" onclick="markWatched('${item.movie_id}')">✓ Watched</button>`:''}<button class="wl-btn remove" onclick="removeFromWatchlist(${item.movie_id})">Remove</button></div></div>`).join('')}
async function addToWatchlist(){if(!currentMovieId)return;try{await fetch(`${API}/watchlists/${currentWatchlist}/movies`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({movie_id:currentMovieId,title:currentMovieTitle})});closeOverlay();if(currentTab==='watchlist')loadWatchlist()}catch(e){}}
async function markWatched(id){await fetch(`${API}/watchlists/${currentWatchlist}/movies/${id}/watched`,{method:'PATCH'});loadWatchlist()}
async function removeFromWatchlist(id){await fetch(`${API}/watchlists/${currentWatchlist}/movies/${id}`,{method:'DELETE'});loadWatchlist()}
document.getElementById('search-input').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeOverlay()});
loadTrending();
</script>
</body>
</html>
